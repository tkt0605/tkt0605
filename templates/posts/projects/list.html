<!--　一覧ページ -->
<ul class="flex flex-col gap-4">
  {% for post in posts %}
  <li class="flex flex-col gap-1">
    <a href="{{ post.href }}" class="group flex flex-col gap-1">
      <span class="font-medium group-hover:underline underline-offset-4">{{ post.title }}</span>
      {% if post.summary %}
      <span class="text-sm text-zinc-500">{{ post.summary }}</span>
      {% endif %}
    </a>
    {% if post.url %}
    <a href="{{ post.url }}" target="_blank" rel="noopener noreferrer" class="text-xs text-zinc-400 hover:text-zinc-900 hover:underline underline-offset-2 self-start">
      {{ post.browse or "外部リンク" }}
    </a>
    {% endif %}
  </li>
  {% endfor %}
</ul>
