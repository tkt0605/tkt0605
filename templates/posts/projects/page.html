{% extends "base.html" %}

{% block content %}
<article>
  <header class="mb-8">
    <a href="/" class="text-sm text-zinc-400 hover:text-zinc-900 transition-colors">← Back</a>
    <h1 class="text-2xl font-semibold mt-4 mb-2">{{ post.title }}</h1>
    {% if post.summary %}
    <p class="text-zinc-500">{{ post.summary }}</p>
    {% endif %}
    {% if post.url %}
    <a href="{{ post.url }}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 mt-3 py-1 px-5 border border-zinc-300 rounded-md hover:bg-zinc-100">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>
        <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/>
      </svg>
      {{ post.browse or "外部リンク" }}
    </a>
    {% endif %}
  </header>

  <div class="prose prose-zinc max-w-none">
    {{ post.content | safe }}
  </div>
</article>
{% endblock %}
