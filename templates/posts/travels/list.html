<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-6 gap-y-10">
  {% for post in posts %}
  <div>
    <div class="aspect-[4/3] w-full overflow-hidden bg-zinc-100">
      {% if post.image %}
      <img src="{{ post.image }}" alt="{{ post.title }}" class="w-full h-full object-cover" loading="lazy">
      {% endif %}
    </div>
    <div class="mt-3">
      <p class="text-sm font-medium text-zinc-900">{{ post.title }}</p>
      {% if post.summary %}
      <p class="text-xs text-zinc-400 mt-0.5 line-clamp-2">{{ post.summary }}</p>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>
