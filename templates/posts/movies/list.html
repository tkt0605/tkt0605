<script>
(function () {
  var detail = document.getElementById("movie-detail");
  var stage = document.getElementById("movie-stage");
  if (!detail || !stage) return;
  var img = detail.querySelector(".hobby-detail-img");
  var title = detail.querySelector(".hobby-detail-title");
  var summary = detail.querySelector(".hobby-detail-summary");
  var cards = stage.querySelectorAll(".hobby-card");

  function show(card) {
    var src = card.dataset.image;
    if (src) {
      img.src = src;
      img.alt = card.dataset.title || "";
      img.style.display = "block";
    } else {
      img.style.display = "none";
    }
    title.textContent = card.dataset.title || "";
    summary.textContent = card.dataset.summary || "";
  }

  cards.forEach(function (card) {
    card.addEventListener("mouseenter", function () { show(card); });
    card.addEventListener("focus", function () { show(card); });
    card.addEventListener("click", function () { show(card); });
  });

  if (cards.length) show(cards[0]);
})();
</script>
