<!--　一覧ページ：ポスター横スクロール（ホバーで詳細表示） -->
<div class="overflow-x-auto bg-zinc-100 rounded-md" style="width: 100%; height: 70%;">
  <div class="flex gap-6 p-6 h-full">
    {% for post in posts %}
    <div class="group relative aspect-[2/3] h-full shrink-0 rounded-md overflow-hidden bg-zinc-100 ring-1 ring-zinc-200">
      {% if post.image %}
      <img src="{{ post.image }}" alt="{{ post.title }}" class="w-full h-full object-cover" loading="lazy">
      {% endif %}
      <div class="absolute inset-0 flex flex-col justify-end p-3 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        <span class="block text-sm font-medium text-white">{{ post.title }}</span>
        {% if post.summary %}
        <span class="block text-xs text-zinc-200 mt-1 line-clamp-3">{{ post.summary }}</span>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
