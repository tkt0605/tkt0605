{% extends "base.html" %}
{% block content %}
<article>
  <header class="mb-8">
    <a href="/" class="text-sm text-zinc-400 hover:text-zinc-900 transition-colors">← Back</a>
    <h1 class="text-2xl font-semibold mt-4 mb-2">{{ post.title }}</h1>
    {% if post.summary %}
    <p class="text-zinc-500">{{ post.summary }}</p>
    {% endif %}
  </header>

  <div class="prose prose-zinc max-w-none">
    {{ post.content | safe }}
  </div>
</article>
{% endblock %}
