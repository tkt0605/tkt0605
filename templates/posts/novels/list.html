<div class="novels-stage" id="novel-stage">
  <div class="flex flex-col" style="width: 400px;">
    {% for post in posts %}
    <div class="novel-card" tabindex="0" role="button" aria-label="{{ post.title }}の詳細を表示"
         data-title="{{ post.title }}" data-summary="{{ post.summary or '' }}" data-image="{{ post.image or '' }}">
      <div class="novel-card-cover">
        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}" loading="lazy">
        {% endif %}
      </div>
      <div class="novel-card-info">
        <div class="novel-card-title">{{ post.title }}</div>
        <div class="novel-card-auther">
          {{ post.auther }}
        </div>
        <!-- {% if post.summary %}
        <div class="novel-card-summary">{{ post.summary }}</div>
        {% endif %} -->
      </div>
    </div>
    {% endfor %}
  </div>
</div>
<div class="flex flex-col p-2">
  <section class="hobby-lineup-row">
    <div class="hobby-lineup-label">
      <span class="hobby-vibe-name">日本小説</span>
    </div>
    <div class="hobby-lineup-detail">
      <p>太宰治</p>
    </div>
  </section>

  <section class="hobby-lineup-row">
    <div class="hobby-lineup-label">
      <span class="hobby-vibe-name">海外小説</span>
    </div>
    <div class="hobby-lineup-detail">
      <p>ヴィクトル・ユーゴー</p>
      <p>ドストエフスキー</p>
      <p>スコットフィッツ・ジェラルド</p>
    </div>
  </section>

  <section class="hobby-lineup-row">
    <div class="hobby-lineup-label">
      <span class="hobby-vibe-name">SF小説</span>
    </div>
    <div class="hobby-lineup-detail">
      <p>アーサー・C・クラーク</p>
      <p>ジョージ・オーウェル</p>
      <p>リウ・ツーシン</p>
    </div>
  </section>
</div>
