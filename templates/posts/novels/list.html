<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
  {% for post in posts %}
  <div class="flex flex-col gap-2">
    {% if post.image %}
    <img src="{{ post.image }}" alt="{{ post.title }}" class="w-full aspect-square object-cover rounded-md" loading="lazy">
    {% endif %}
    <div class="flex flex-col">
      <span class="font-medium">{{ post.title }}</span>
      {% if post.summary %}
      <span class="text-sm text-zinc-500">{{ post.summary }}</span>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>
