<div class="music-stage" id="music-stage">
  <div class="flex flex-col" style="width: 400px;">
    {% for post in posts %}
    <div class="music-card" tabindex="0" role="button" aria-label="{{ post.title }}の詳細を表示"
         data-title="{{ post.title }}" data-summary="{{ post.summary or '' }}" data-image="{{ post.image or '' }}">
      <div class="music-card-cover">
        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}" loading="lazy">
        {% endif %}
      </div>
      <div class="music-card-info">
        <div class="music-card-title">{{ post.title }}</div>
        {% if post.author %}
        <div class="music-card-author">{{ post.author }}</div>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
