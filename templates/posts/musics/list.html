<!--　一覧ページ：iPod風 -->
<div class="max-w-xs mx-auto bg-zinc-100 rounded-[2rem] border border-zinc-300 shadow-xl p-3">
  <!-- スクリーン -->
  <div class="bg-white rounded-lg border border-zinc-300 overflow-hidden mb-5">
    <div class="bg-zinc-200 px-3 py-1.5 text-center text-xs font-semibold text-zinc-600 border-b border-zinc-300">
      Music
    </div>
    <ul class="divide-y divide-zinc-100 max-h-72 overflow-y-auto">
      {% for post in posts %}
      <li class="group px-3 py-2 hover:bg-blue-500 cursor-default">
        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}" class="w-full h-full object-cover" loading="lazy">
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </div>

  <!-- クリックホイール -->
  <div class="relative w-40 h-40 mx-auto rounded-full bg-zinc-200 border border-zinc-300">
    <span class="absolute top-3 left-1/2 -translate-x-1/2 text-[10px] tracking-wide text-zinc-400 font-semibold">MENU</span>
    <span class="absolute bottom-3 left-1/2 -translate-x-1/2 text-zinc-400 text-sm">⏯</span>
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">⏮</span>
    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">⏭</span>
    <div class="absolute inset-0 m-auto w-14 h-14 rounded-full bg-white border border-zinc-300"></div>
  </div>
</div>
