<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/index.css" />
  {% block head %}{% endblock %}
</head>
<body class="bg-white text-zinc-900 min-h-screen">
  <div class="w-5xl mx-auto px-4 py-8">
    <header class="flex items-center justify-between mb-12">
      <a href="/" class="text-lg font-semibold tracking-tight hover:opacity-60 transition-opacity">
        Tkt0605.me
      </a>
      <nav class="flex gap-2 text-sm text-zinc-500">
        <a class="flex items-center gap-2 py-2 px-5 border border-zinc-300 rounded-md hover:bg-zinc-100" href="https://x.com/TakatoKomada" target="_blank" rel="noopener noreferrer">
            <div class="w-4 h-4 bg-zinc-500 [mask-repeat:no-repeat] [mask-size:contain] [mask-position:center]" style="mask-image: url('/assets/logo-white.png');"></div>
            <span>X</span>
        </a>
        <a class="flex items-center gap-2 py-2 px-5 border border-zinc-300 rounded-md hover:bg-zinc-100" href="https://github.com/tkt0605" target="_blank" rel="noopener noreferrer">
            <div class="w-4 h-4 bg-zinc-500 [mask-repeat:no-repeat] [mask-size:contain] [mask-position:center]" style="mask-image: url('/assets/github.svg');"></div>
            <span>GitHub</span>
        </a>
      </nav>
    </header>
    <main class="flex flex-col ">
      <div class="profile-photo-wrap mt-4 mx-auto w-56 max-w-full sm:float-right sm:mt-0 sm:ml-4 sm:mb-4 sm:mx-0 sm:w-52 md:w-60 lg:w-64">
        <img alt="takato komadaの肖像画" class="photo-main w-full object-cover rounded-md" decoding="async" loading="eager" src="/assets/me.jpg.webp">
        <!-- <img alt="takato komadaのふざけた肖像画" class="photo-alt w-full object-cover rounded-md" decoding="async" loading="eager" src="/assets/me_alt.jpg.webp"> -->
        <span class="easter-egg-note">
          <font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">イースターエッグを見つけてくれたんですね！</font></font>  
        </span> 
      </div>
      {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 pt-8 border-t border-zinc-100 text-sm text-zinc-400">
        &copy;2026 Produced by Takato Komada 
    </footer>
  </div>
</body>
</html>
